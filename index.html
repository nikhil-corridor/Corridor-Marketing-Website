<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corridor Advisors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.15) 0%,
        rgba(0, 0, 0, 0.05) 40%,
        rgba(0, 0, 0, 0.05) 60%,
        rgba(0, 0, 0, 0.3) 100%
      );
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    .logo {
      width: min(360px, 70vw);
      filter: brightness(0) invert(1);
      opacity: 0;
      animation: fadeIn 1.2s ease-out 0.3s forwards;
    }

    .contact-btn {
      display: inline-block;
      padding: 14px 40px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50px;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 0.7s forwards;
    }

    .contact-btn:hover {
      background: rgba(255, 255, 255, 0.28);
      border-color: rgba(255, 255, 255, 0.6);
      transform: translateY(-1px);
    }

    .contact-btn:active {
      transform: translateY(0);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <video src="background.mp4" autoplay muted loop playsinline></video>
  </div>
  <div class="overlay"></div>
  <div class="content">
    <img class="logo" src="logo.png" alt="Corridor" />
    <a class="contact-btn" href="mailto:naggarwal@corridoradvisors.com">Contact Us</a>
  </div>
  <script>
    document.querySelector('.background video').playbackRate = 0.75;
  </script>
</body>
</html>
